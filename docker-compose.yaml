version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: server
    volumes:
      - ./server/public/uploads:/app/public/uploads
    expose:
      - "3000"
    restart: always

  client:
    build:
      context: ./client
    container_name: client
    ports: 
      - "80:5173"
    restart: always



version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: server
    volumes:
      - ./server/public/uploads:/app/public/uploads
      - ./server/assets:/app/assets  
    ports:
      - "3000:3000"
    restart: always
    networks:
      - app-network

  client:
    build:
      context: ./client
    container_name: client
    ports: 
      - "80:5173"
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge